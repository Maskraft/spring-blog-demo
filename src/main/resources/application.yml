server:
  port: 8080

spring:
  # デフォルトプロファイルは dev（ローカル開発 = MySQL）。テスト実行時は test プロファイルが有効化される
  profiles:
    default: dev
  jpa:
    # OSIV を無効化し、ビュー層で Hibernate Session を保持しないようにする
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

logging:
  level:
    "[org.hibernate.SQL]": debug
