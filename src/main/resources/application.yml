server:
  port: 8080

spring:
  datasource:
    # H2 インメモリデータベース：プロセス終了時に破棄される。MODE=MySQL で将来の MySQL 移行を容易にする
    url: jdbc:h2:mem:blogdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # 起動ごとにテーブル作成、終了時に削除（インメモリ運用）
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # OSIV を無効化し、ビュー層で Hibernate Session を保持しないようにする
    open-in-view: false
  h2:
    console:
      # 開発時にテーブルとデータを目視確認できる：http://localhost:8080/h2-console
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.SQL: debug
