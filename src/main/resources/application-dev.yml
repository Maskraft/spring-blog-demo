# 開発プロファイル：docker-compose の MySQL に接続する
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blogdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
    username: bloguser
    password: blogpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Flyway がスキーマを管理するため、JPA は検証のみ行う（エンティティと DB が食い違えば起動失敗）
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
